# Test profile
# Prefer deterministic, local-only behavior for smoke tests and CI.

spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:anjing_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    druid:
      validation-query: SELECT 1
      initial-size: 1
      min-idle: 1
      max-active: 5
      stat-view-servlet:
        enabled: false
      web-stat-filter:
        enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        show_sql: false
        format_sql: false
        dialect: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}

management:
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    enabled: ${OPENAPI_API_DOCS_ENABLED:true}

logging:
  level:
    root: INFO
    com.anjing: INFO
    org.springframework: WARN
    org.hibernate: WARN

app:
  remote-http:
    connect-timeout-ms: ${REMOTE_HTTP_CONNECT_TIMEOUT_MS:1000}
    read-timeout-ms: ${REMOTE_HTTP_READ_TIMEOUT_MS:2000}
    default-retry-count: ${REMOTE_HTTP_DEFAULT_RETRY_COUNT:0}
  features:
    redis:
      enabled: ${FEATURE_REDIS_ENABLED:false}
    cache:
      enabled: true
      type: ${FEATURE_CACHE_TYPE:memory}
      enable-stats: false
    distributed-lock:
      enabled: true
      provider: ${FEATURE_DISTRIBUTED_LOCK_PROVIDER:local}
    middleware:
      kafka:
        enabled: ${FEATURE_KAFKA_ENABLED:false}
      minio:
        enabled: ${FEATURE_MINIO_ENABLED:false}
      oss:
        enabled: ${FEATURE_OSS_ENABLED:false}
    monitoring:
      enabled: true
      enable-performance: false
      enable-health-check: true
      enable-metrics: false
