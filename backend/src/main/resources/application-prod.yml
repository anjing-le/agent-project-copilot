# Production profile
# Enable external middleware deliberately through environment variables.

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        show_sql: false
        format_sql: false
        generate_statistics: false
  datasource:
    druid:
      initial-size: ${DB_POOL_INITIAL_SIZE:5}
      min-idle: ${DB_POOL_MIN_IDLE:10}
      max-active: ${DB_POOL_MAX_ACTIVE:50}
      stat-view-servlet:
        enabled: ${DRUID_STAT_VIEW_ENABLED:false}
      web-stat-filter:
        enabled: ${DRUID_WEB_STAT_ENABLED:false}

management:
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    enabled: ${OPENAPI_API_DOCS_ENABLED:false}

logging:
  level:
    root: INFO
    com.anjing: INFO
    org.springframework: WARN
    org.hibernate: WARN
    com.alibaba.druid: WARN

anjing:
  logging:
    enable-sql-file: false
    enable-json-log: ${APP_ENABLE_JSON_LOG:true}
    async-queue-size: ${APP_LOG_ASYNC_QUEUE_SIZE:4096}

app:
  remote-http:
    connect-timeout-ms: ${REMOTE_HTTP_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${REMOTE_HTTP_READ_TIMEOUT_MS:5000}
    default-retry-count: ${REMOTE_HTTP_DEFAULT_RETRY_COUNT:1}
  features:
    redis:
      enabled: ${FEATURE_REDIS_ENABLED:false}
    cache:
      enabled: true
      type: ${FEATURE_CACHE_TYPE:memory}
      enable-stats: ${FEATURE_CACHE_STATS_ENABLED:false}
    distributed-lock:
      enabled: true
      provider: ${FEATURE_DISTRIBUTED_LOCK_PROVIDER:local}
    middleware:
      kafka:
        enabled: ${FEATURE_KAFKA_ENABLED:false}
      minio:
        enabled: ${FEATURE_MINIO_ENABLED:false}
      oss:
        enabled: ${FEATURE_OSS_ENABLED:false}
    monitoring:
      enabled: true
      enable-performance: ${FEATURE_MONITORING_PERFORMANCE_ENABLED:false}
      enable-health-check: true
      enable-metrics: ${FEATURE_MONITORING_METRICS_ENABLED:true}
