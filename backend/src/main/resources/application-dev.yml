# Development profile
# Keep local startup light: optional remote middleware is disabled unless explicitly enabled.

spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:anjing_dev;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    druid:
      validation-query: SELECT 1
      stat-view-servlet:
        enabled: true
      web-stat-filter:
        enabled: true
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        dialect: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    enabled: ${OPENAPI_API_DOCS_ENABLED:true}

logging:
  level:
    com.anjing: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.data.jpa: DEBUG

app:
  remote-http:
    connect-timeout-ms: ${REMOTE_HTTP_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${REMOTE_HTTP_READ_TIMEOUT_MS:5000}
    default-retry-count: ${REMOTE_HTTP_DEFAULT_RETRY_COUNT:0}
  features:
    redis:
      enabled: ${FEATURE_REDIS_ENABLED:false}
    cache:
      enabled: true
      type: ${FEATURE_CACHE_TYPE:memory}
    distributed-lock:
      enabled: true
      provider: ${FEATURE_DISTRIBUTED_LOCK_PROVIDER:local}
    middleware:
      kafka:
        enabled: ${FEATURE_KAFKA_ENABLED:false}
      minio:
        enabled: ${FEATURE_MINIO_ENABLED:false}
      oss:
        enabled: ${FEATURE_OSS_ENABLED:false}
    monitoring:
      enabled: true
      enable-performance: true
      enable-health-check: true
      enable-metrics: true
